name: CI — Lint, Test & Build

on:
  push:
    branches: [ main, "release/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install ruff black mypy

      - name: Ruff (linting)
        run: ruff check src/ tests/

      - name: Black (formatting)
        run: black --check src/ tests/

      - name: MyPy (type checking)
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking for now

  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Java (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Run unit tests
        env:
          # Dummy values — no real credentials in CI
          ERP_SQL_SERVER:      "sql-erp-test.database.windows.net"
          ERP_SQL_DATABASE:    "erp_db_test"
          AZURE_CLIENT_ID:     "00000000-0000-0000-0000-000000000001"
          AZURE_TENANT_ID:     "00000000-0000-0000-0000-000000000002"
          AZURE_KEY_VAULT_URL: "https://kv-test.vault.azure.net/"
          FABRIC_WORKSPACE_ID: "00000000-0000-0000-0000-000000000003"
        run: |
          pytest tests/unit/ \
            --tb=short \
            --junitxml=test-results/unit-tests.xml \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  sql-lint:
    name: SQL Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL files
        run: |
          sqlfluff lint sql/ \
            --dialect tsql \
            --rules L001,L002,L003,L010,L014,L019,L031,L036

  # ──────────────────────────────────────────────────────────────────────────
  bicep-validate:
    name: Bicep Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep build (compile check)
        run: |
          az bicep build --file infra/bicep/main.bicep

      - name: Bicep lint
        run: |
          az bicep lint --file infra/bicep/main.bicep

  # ──────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit (SAST)
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r src/ \
            -c pyproject.toml \
            --severity-level medium \
            -f json \
            -o bandit-report.json
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ──────────────────────────────────────────────────────────────────────────
  schema-validate:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate lakehouse schema files
        run: |
          python - <<'EOF'
          import json, glob, sys
          errors = []
          for path in glob.glob("fabric/lakehouse/schemas/**/*.schema.json", recursive=True):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  required = ["layer", "table_name", "columns"]
                  missing = [k for k in required if k not in data]
                  if missing:
                      errors.append(f"{path}: missing keys {missing}")
              except json.JSONDecodeError as e:
                  errors.append(f"{path}: JSON parse error — {e}")
          if errors:
              print("Schema validation FAILED:")
              for e in errors: print(f"  {e}")
              sys.exit(1)
          print(f"All schema files valid ({len(list(glob.glob('fabric/**/*.schema.json', recursive=True)))} files)")
          EOF

  # ──────────────────────────────────────────────────────────────────────────
  # Summary gate — required to pass for branch protection
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [ lint, unit-tests, sql-lint, bicep-validate, schema-validate ]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}"           != "success" ]] ||
             [[ "${{ needs.unit-tests.result }}"     != "success" ]] ||
             [[ "${{ needs.sql-lint.result }}"       != "success" ]] ||
             [[ "${{ needs.bicep-validate.result }}" != "success" ]] ||
             [[ "${{ needs.schema-validate.result }}" != "success" ]]; then
            echo "One or more CI jobs failed. Blocking merge."
            exit 1
          fi
          echo "All CI checks passed."
